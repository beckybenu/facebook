name: Deploy PayTap to GitHub Pages

on:
  push:
    branches:
      - claude/contactless-money-transfer-wipwj4
    paths:
      - 'contactless_transfer/**'
      - '.github/workflows/deploy-paytap.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload PayTap app
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./contactless_transfer

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
