# Blueprint de déploiement Render pour Tipper.
# Sur https://render.com → New → Blueprint → connectez ce repo GitHub.
# Render lit ce fichier, build et déploie automatiquement (offre gratuite).
services:
  - type: web
    name: tipper
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: >-
      cd tipper &&
      npm --prefix server install &&
      npm --prefix client install &&
      npm --prefix client run build &&
      npm --prefix server run seed
    startCommand: cd tipper && npm --prefix server start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: JWT_SECRET
        generateValue: true
      - key: VAPID_SUBJECT
        value: mailto:contact@tipper.app
